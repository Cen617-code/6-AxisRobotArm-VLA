# moveit_controllers.yaml
#
# MoveIt 控制器配置，将 MoveIt 的规划输出映射到具体的底层控制器。

moveit_simple_controller_manager:
  controller_names:
    - arm_controller

  arm_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
